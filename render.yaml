services:
  - type: web
    name: reel-analyzer-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://reelzanalyze1.vercel.app
